name: build-apk
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Download Tesseract language data
        run: |
          mkdir -p app/src/main/assets/tessdata
          curl -sL -o app/src/main/assets/tessdata/heb.traineddata https://github.com/tesseract-ocr/tessdata_fast/raw/main/heb.traineddata
          curl -sL -o app/src/main/assets/tessdata/ara.traineddata https://github.com/tesseract-ocr/tessdata_fast/raw/main/ara.traineddata

      - name: Build APK
        run: gradle assembleDebug

      - name: Publish APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: diag
          name: "אפליקציית בדיקה - Diagnostic"
          body: "הורד את קובץ ה-APK והתקן בטלפון"
          files: app/build/outputs/apk/debug/app-debug.apk
