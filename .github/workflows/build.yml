name: build
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download Tesseract language data
        run: |
          mkdir -p app/src/main/assets/tessdata
          curl -sL -o app/src/main/assets/tessdata/heb.traineddata https://github.com/tesseract-ocr/tessdata_fast/raw/main/heb.traineddata
          curl -sL -o app/src/main/assets/tessdata/ara.traineddata https://github.com/tesseract-ocr/tessdata_fast/raw/main/ara.traineddata

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare CLIP model (on-device AI, nothing sent out at runtime)
        run: |
          pip install --quiet torch --index-url https://download.pytorch.org/whl/cpu
          pip install --quiet transformers onnx onnxscript onnxruntime pillow
          python prepare_clip.py

      - name: Generate signing keystore (first run only)
        run: |
          if [ ! -f release.keystore ]; then
            keytool -genkeypair -keystore release.keystore -alias sf -keyalg RSA -keysize 2048 -validity 10000 -storepass screenfinder -keypass screenfinder -dname "CN=ScreenFinder"
            git config user.name github-actions
            git config user.email github-actions@users.noreply.github.com
            git add -f release.keystore
            git commit -m "ci: add signing keystore"
            git push
          fi

      - name: Unit tests
        run: gradle testReleaseUnitTest

      - name: Emulator test (real Android, scan + OCR + search + delete)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          script: gradle connectedDebugAndroidTest

      - name: Build signed release APK
        run: gradle assembleRelease

      - name: Prepare APK
        run: cp app/build/outputs/apk/release/app-release.apk ScreenFinder.apk

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "ScreenFinder v${{ github.run_number }}"
          body: "הורד את ScreenFinder.apk והתקן. עדכון מתקין מעל הגרסה הקודמת בלי לאבד נתונים."
          files: ScreenFinder.apk
